<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday - Hữu Tuân</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"
      crossorigin="anonymous"
    ></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #000000;
        font-family: "Segoe UI", sans-serif;
      }
      #canvas-container {
        width: 100%;
        height: 100vh;
        display: block;
      }

      /* UI Center Vandiep */
      #ui-layer {
        position: absolute;
        bottom: 30px;
        width: 100%;
        text-align: center;
        pointer-events: none;
        z-index: 100;
      }

      /* Guide text Vandiep */
      .guide {
        color: rgba(255, 255, 255, 0.6);
        font-size: 15px;
        margin-bottom: 20px;
        padding: 0 15px;
        line-height: 1.6;
        text-shadow: 0 2px 4px black;
      }

      button {
        pointer-events: auto;
        cursor: pointer;
        background: linear-gradient(to bottom, #d32f2f, #8b0000);
        color: #fff;
        border: 2px solid #ffd700;
        padding: 15px 50px;
        border-radius: 30px;
        font-weight: 800;
        font-size: 16px;
        box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }

      /* Camera Preview Vandiep */
      #camera-preview {
        display: none;
        position: absolute;
        top: 15px;
        right: 15px;
        width: 120px;
        height: 90px;
        border: 2px solid rgba(255, 0, 0, 0.5);
        transform: scaleX(-1);
        opacity: 0.6;
        border-radius: 8px;
      }

      /* Mobile Adapt Vandiep */
      @media (max-width: 768px) {
        #camera-preview {
          top: 10px;
          right: 10px;
          width: 80px;
          height: 60px;
        }
        button {
          padding: 12px 35px;
          font-size: 14px;
        }
        .guide {
          font-size: 13px;
        }
      }

      /* Vandiep */
      #copyright {
        position: absolute;
        bottom: 10px;
        right: 15px;
        color: rgba(255, 255, 255, 0.3);
        font-size: 12px;
        z-index: 100;
        font-family: sans-serif;
        pointer-events: none;
        font-style: italic;
      }

      #error-log {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        color: red;
        background: rgba(0, 0, 0, 0.8);
        z-index: 999;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div id="error-log"></div>

    <div id="ui-layer">
      <div class="guide">
        🖐 <b>Open:</b> Explode &nbsp;|&nbsp; 🫶 <b>Heart:</b> Love
        &nbsp;|&nbsp; ✊ <b>Fist:</b> Cake
      </div>
      <button id="btnStart" onclick="startSystem()">START MAGIC</button>
    </div>
    <div id="canvas-container"></div>
    <video class="input_video" style="display: none"></video>
    <canvas id="camera-preview"></canvas>

    <script>
      // ==========================================
      // 1. RESOURCES CONFIG Vandiep
      // ==========================================
      const MUSIC_URL = "audio.mp3";
      let bgMusic = new Audio(MUSIC_URL);
      bgMusic.loop = true;
      bgMusic.volume = 1.0;

      const loader = new THREE.TextureLoader();
      const photoFiles = ["1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg"];
      const photoTextures = [];
      photoFiles.forEach((f, i) => (photoTextures[i] = loader.load(f)));

      function createCustomTexture(type) {
        const canvas = document.createElement("canvas");
        canvas.width = 128;
        canvas.height = 128;
        const ctx = canvas.getContext("2d");
        const cx = 64,
          cy = 64;

        if (type === "gold_glow") {
          const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40);
          grd.addColorStop(0, "#FFFFFF");
          grd.addColorStop(0.2, "#FFFFE0");
          grd.addColorStop(0.5, "#FFD700");
          grd.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = grd;
          ctx.fillRect(0, 0, 128, 128);
        } else if (type === "red_light") {
          const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 50);
          grd.addColorStop(0, "#FFAAAA");
          grd.addColorStop(0.3, "#FF0000");
          grd.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = grd;
          ctx.fillRect(0, 0, 128, 128);
        } else if (type === "gift_red") {
          ctx.fillStyle = "#D32F2F";
          ctx.fillRect(20, 20, 88, 88);
          ctx.fillStyle = "#FFD700";
          ctx.fillRect(54, 20, 20, 88);
          ctx.fillRect(20, 54, 88, 20);
          ctx.strokeStyle = "rgba(0,0,0,0.3)";
          ctx.lineWidth = 2;
          ctx.strokeRect(20, 20, 88, 88);
        }
        return new THREE.CanvasTexture(canvas);
      }

      const textures = {
        gold: createCustomTexture("gold_glow"),
        red: createCustomTexture("red_light"),
        gift: createCustomTexture("gift_red"),
      };

      // ==========================================
      // 2. SYSTEM CONFIG Vandiep
      // ==========================================
      const CONFIG = {
        goldCount: 2000,
        redCount: 1200,
        giftCount: 500,
        explodeRadius: 65,
        photoOrbitRadius: 25,
        treeHeight: 60,
        treeBaseRadius: 35,
      };

      let scene, camera, renderer;
      let groupGold, groupRed, groupGift;
      let photoMeshes = [];
      let titleMesh, loveMesh;

      let state = "CAKE";
      let selectedIndex = 0;
      let handX = 0.5;

      // ==========================================
      // 3. THREE.JS SYSTEM Vandiep
      // ==========================================
      function init3D() {
        const container = document.getElementById("canvas-container");
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.002);

        camera = new THREE.PerspectiveCamera(
          60,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        );
        // Tự động đẩy camera ra xa trên điện thoại (Mobile Adapt)
        camera.position.z = window.innerWidth < 768 ? 140 : 100;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        groupGold = createParticleSystem("gold", CONFIG.goldCount, 2.0);
        groupRed = createParticleSystem("red", CONFIG.redCount, 3.5);
        groupGift = createParticleSystem("gift", CONFIG.giftCount, 3.0);

        createPhotos();
        createDecorations();
        animate();
      }

      function createParticleSystem(type, count, size) {
        const pPositions = [];
        const pExplodeTargets = [];
        const pCakeTargets = [];
        const pHeartTargets = [];
        const sizes = [];
        const phases = [];
        const cakeColorsArr = []; // Lưu trữ màu bánh riêng biệt

        for (let i = 0; i < count; i++) {
          // --- CAKE Vandiep (TẠO HÌNH 3 TẦNG & 7 NẾN CHI TIẾT) ---
          let cx, cy, cz;
          let specificColor = new THREE.Color(0xffffff);
          const tier = Math.random();
          const theta = Math.random() * Math.PI * 2;

          if (tier < 0.35) {
            // Tầng 1 (Dưới cùng)
            let h = Math.random() * 20;
            let maxR = CONFIG.treeBaseRadius; // 35
            let r = maxR * (0.6 + 0.4 * Math.random());
            cx = r * Math.cos(theta);
            cz = r * Math.sin(theta);
            cy = h - CONFIG.treeHeight / 2;

            // Viền trang trí đáy tầng 1 (Piping)
            if (h < 3.5) {
              r = maxR + Math.sin(theta * 25) * 1.5;
              cx = r * Math.cos(theta);
              cz = r * Math.sin(theta);
              specificColor.setHex(0xffffff); // Kem trắng viền
            } else if (h > 15 + Math.sin(theta * 8) * 2.5) {
              // Kem chảy
              specificColor.setHex(0xff69b4); // Kem dâu hồng
            } else {
              specificColor.setHex(0xffe4c4); // Cốt bánh Bisque
            }
          } else if (tier < 0.65) {
            // Tầng 2 (Giữa)
            let h = 20 + Math.random() * 15;
            let maxR = CONFIG.treeBaseRadius * 0.75;
            let r = maxR * (0.55 + 0.45 * Math.random());
            cx = r * Math.cos(theta);
            cz = r * Math.sin(theta);
            cy = h - CONFIG.treeHeight / 2;

            // Viền trang trí đáy tầng 2
            if (h < 23) {
              r = maxR + Math.sin(theta * 20) * 1.5;
              cx = r * Math.cos(theta);
              cz = r * Math.sin(theta);
              specificColor.setHex(0xffffff);
            } else if (h > 31 + Math.sin(theta * 6) * 2.0) {
              // Kem chảy
              specificColor.setHex(0x3e1e04); // Kem Socola đen
            } else {
              specificColor.setHex(0xd2691e); // Cốt socola nhạt
            }
          } else if (tier < 0.88) {
            // Tầng 3 (Trên cùng)
            let h = 35 + Math.random() * 15;
            let maxR = CONFIG.treeBaseRadius * 0.5;
            let r = maxR * (0.5 + 0.5 * Math.random());
            cx = r * Math.cos(theta);
            cz = r * Math.sin(theta);
            cy = h - CONFIG.treeHeight / 2;

            // Viền trang trí đáy tầng 3
            if (h < 38) {
              r = maxR + Math.sin(theta * 15) * 1.2;
              cx = r * Math.cos(theta);
              cz = r * Math.sin(theta);
              specificColor.setHex(0xffffff);
            } else if (h > 46 + Math.sin(theta * 5) * 1.5) {
              // Kem chảy
              specificColor.setHex(0xffd700); // Kem chanh vàng
            } else {
              specificColor.setHex(0xfff8dc); // Cốt vanilla
            }
          } else if (tier < 0.95) {
            // Nến (7 cây xoắn ốc)
            const numCandles = 7;
            const candleIdx = Math.floor(Math.random() * numCandles);
            const angle = (candleIdx / numCandles) * Math.PI * 2;
            const rad = CONFIG.treeBaseRadius * 0.35;

            const baseX = rad * Math.cos(angle);
            const baseZ = rad * Math.sin(angle);

            let h = 50 + Math.random() * 8;
            let cr = 1.0 * Math.random();
            let cTheta = Math.random() * Math.PI * 2;

            cx = baseX + cr * Math.cos(cTheta);
            cz = baseZ + cr * Math.sin(cTheta);
            cy = h - CONFIG.treeHeight / 2;

            const candleColors = [
              0xff0000, 0x00ff00, 0x0000ff, 0xff00ff, 0x00ffff, 0xffa500,
              0xff1493,
            ];
            specificColor.setHex(candleColors[candleIdx]);

            // Tạo vân sọc xoắn ốc cho nến
            if (Math.sin(h * 1.5 + cTheta) > 0.5) {
              specificColor.setHex(0xffffff);
            }
          } else {
            // Ngọn lửa nến (Hiệu ứng lõi sáng viền ngoài)
            const numCandles = 7;
            const candleIdx = Math.floor(Math.random() * numCandles);
            const angle = (candleIdx / numCandles) * Math.PI * 2;
            const rad = CONFIG.treeBaseRadius * 0.35;

            const baseX = rad * Math.cos(angle);
            const baseZ = rad * Math.sin(angle);

            let h = 58 + Math.random() * 7;
            let cr = 1.6 * Math.random() * (1 - (h - 58) / 7); // Nhỏ dần ở chóp
            let cTheta = Math.random() * Math.PI * 2;

            cx = baseX + cr * Math.cos(cTheta);
            cz = baseZ + cr * Math.sin(cTheta);
            cy = h - CONFIG.treeHeight / 2;

            if (cr < 0.4) {
              specificColor.setHex(0xffffff); // Lõi lửa trắng
            } else if (cr < 0.8) {
              specificColor.setHex(0xffff00); // Vàng
            } else {
              specificColor.setHex(0xff4500); // Đỏ cam
            }
          }

          pCakeTargets.push(cx, cy, cz);
          cakeColorsArr.push(specificColor.r, specificColor.g, specificColor.b);

          // --- EXPLODE Vandiep ---
          const u = Math.random();
          const v = Math.random();
          const phi = Math.acos(2 * v - 1);
          const lam = 2 * Math.PI * u;
          let radMult = type === "gift" ? 1.2 : 1.0;
          const rad = CONFIG.explodeRadius * Math.cbrt(Math.random()) * radMult;
          pExplodeTargets.push(
            rad * Math.sin(phi) * Math.cos(lam),
            rad * Math.sin(phi) * Math.sin(lam),
            rad * Math.cos(phi),
          );

          // --- SOFT HEART Vandiep ---
          const tHeart = Math.random() * Math.PI * 2;
          let hx = 16 * Math.pow(Math.sin(tHeart), 3);
          let hy =
            13 * Math.cos(tHeart) -
            5 * Math.cos(2 * tHeart) -
            2 * Math.cos(3 * tHeart) -
            Math.cos(4 * tHeart);

          const rFill = Math.pow(Math.random(), 0.3); // Soft fill Vandiep
          hx *= rFill;
          hy *= rFill;
          let hz = (Math.random() - 0.5) * 8 * rFill;

          const noise = 1.0;
          hx += (Math.random() - 0.5) * noise;
          hy += (Math.random() - 0.5) * noise;
          hz += (Math.random() - 0.5) * noise;

          const scaleH = 2.2;
          pHeartTargets.push(hx * scaleH, hy * scaleH + 5, hz);

          // --- INIT Vandiep ---
          pPositions.push(
            pCakeTargets[i * 3],
            pCakeTargets[i * 3 + 1],
            pCakeTargets[i * 3 + 2],
          );
          sizes.push(size);
          phases.push(Math.random() * Math.PI * 2);
        }

        const geo = new THREE.BufferGeometry();
        geo.setAttribute(
          "position",
          new THREE.Float32BufferAttribute(pPositions, 3),
        );
        geo.setAttribute("size", new THREE.Float32BufferAttribute(sizes, 1));

        // Init colors Vandiep
        const colors = new Float32Array(count * 3);
        const baseColor = new THREE.Color();
        if (type === "gold") baseColor.setHex(0xffd700);
        else if (type === "red") baseColor.setHex(0xff0000);
        else baseColor.setHex(0xffffff);

        for (let i = 0; i < count; i++) {
          colors[i * 3] = baseColor.r;
          colors[i * 3 + 1] = baseColor.g;
          colors[i * 3 + 2] = baseColor.b;
        }
        geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));

        geo.userData = {
          cake: pCakeTargets,
          explode: pExplodeTargets,
          heart: pHeartTargets,
          phases: phases,
          baseColor: baseColor,
          baseSize: size,
          cakeColors: new Float32Array(cakeColorsArr),
        };

        const mat = new THREE.PointsMaterial({
          size: size,
          map: textures[type],
          transparent: true,
          opacity: 1.0,
          vertexColors: true,
          blending:
            type === "gift" ? THREE.NormalBlending : THREE.AdditiveBlending,
          depthWrite: false,
          sizeAttenuation: true,
        });

        const points = new THREE.Points(geo, mat);
        scene.add(points);
        return points;
      }

      function createPhotos() {
        const geo = new THREE.PlaneGeometry(8, 8);
        const borderGeo = new THREE.PlaneGeometry(9, 9);
        const borderMat = new THREE.MeshBasicMaterial({ color: 0xffd700 });

        for (let i = 0; i < 5; i++) {
          const mat = new THREE.MeshBasicMaterial({
            map: photoTextures[i],
            side: THREE.DoubleSide,
          });
          const mesh = new THREE.Mesh(geo, mat);
          const border = new THREE.Mesh(borderGeo, borderMat);
          border.position.z = -0.1;
          mesh.add(border);
          mesh.visible = false;
          mesh.scale.set(0, 0, 0);
          scene.add(mesh);
          photoMeshes.push(mesh);
        }
      }

      function createDecorations() {
        // HAPPY BIRTHDAY Vandiep
        const canvas = document.createElement("canvas");
        canvas.width = 1024;
        canvas.height = 256;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#FFD700";
        ctx.textAlign = "center";
        ctx.shadowColor = "#FF0000";
        ctx.shadowBlur = 40;

        ctx.font = 'bold italic 75px "Times New Roman"';
        ctx.fillText("CHÚC MỪNG SINH NHẬT", 512, 90);
        ctx.font = 'bold italic 100px "Times New Roman"';
        ctx.fillText("Hữu Tuân", 512, 220);
        const tex = new THREE.CanvasTexture(canvas);
        const mat = new THREE.MeshBasicMaterial({
          map: tex,
          transparent: true,
          blending: THREE.AdditiveBlending,
        });
        titleMesh = new THREE.Mesh(new THREE.PlaneGeometry(60, 15), mat);
        titleMesh.position.set(0, 52, 0);
        scene.add(titleMesh);

        // I LOVE YOU TEXT Vandiep
        const loveCanvas = document.createElement("canvas");
        loveCanvas.width = 1024;
        loveCanvas.height = 256;
        const lCtx = loveCanvas.getContext("2d");
        lCtx.fillStyle = "#FF69B4";
        lCtx.textAlign = "center";
        lCtx.shadowColor = "#FF1493";
        lCtx.shadowBlur = 40;

        lCtx.font = 'bold 70px "Segoe UI", sans-serif';
        lCtx.fillText("CHÚC MỪNG SINH NHẬT ❤️", 512, 90);
        lCtx.font = 'bold 90px "Segoe UI", sans-serif';
        lCtx.fillText("Hữu Tuân", 512, 220);
        const loveTex = new THREE.CanvasTexture(loveCanvas);
        const loveMat = new THREE.MeshBasicMaterial({
          map: loveTex,
          transparent: true,
          blending: THREE.AdditiveBlending,
        });
        loveMesh = new THREE.Mesh(new THREE.PlaneGeometry(70, 18), loveMat);
        loveMesh.position.set(0, 0, 20);
        loveMesh.visible = false;
        scene.add(loveMesh);
      }

      function updateParticleGroup(
        group,
        type,
        targetState,
        speed,
        handRotY,
        time,
      ) {
        const positions = group.geometry.attributes.position.array;
        const sizes = group.geometry.attributes.size.array;
        const colors = group.geometry.attributes.color.array;
        const phases = group.geometry.userData.phases;
        const baseColor = group.geometry.userData.baseColor;
        const baseSize = group.geometry.userData.baseSize;
        const cakeColors = group.geometry.userData.cakeColors;

        const targetKey =
          targetState === "CAKE"
            ? "cake"
            : targetState === "HEART"
              ? "heart"
              : "explode";
        const targets =
          group.geometry.userData[
            targetState === "PHOTO" ? "explode" : targetKey
          ];

        // 1. Vandiep
        for (let i = 0; i < positions.length; i++) {
          positions[i] += (targets[i] - positions[i]) * speed;
        }
        group.geometry.attributes.position.needsUpdate = true;

        // 2. COLOR & SIZE Vandiep
        const count = positions.length / 3;

        if (targetState === "CAKE") {
          group.rotation.y += 0.003;

          for (let i = 0; i < count; i++) {
            sizes[i] = baseSize;
            let brightness = 0.9 + 0.3 * Math.sin(time * 5 + phases[i]);

            colors[i * 3] = cakeColors[i * 3] * brightness;
            colors[i * 3 + 1] = cakeColors[i * 3 + 1] * brightness;
            colors[i * 3 + 2] = cakeColors[i * 3 + 2] * brightness;
          }
          group.geometry.attributes.color.needsUpdate = true;
          group.geometry.attributes.size.needsUpdate = true;
        } else if (targetState === "HEART") {
          group.rotation.y = 0;
          const beatScale = 1 + Math.abs(Math.sin(time * 3)) * 0.15;
          group.scale.set(beatScale, beatScale, beatScale);

          // Vandiep
          for (let i = 0; i < count; i++) {
            colors[i * 3] = baseColor.r;
            colors[i * 3 + 1] = baseColor.g;
            colors[i * 3 + 2] = baseColor.b;
            if (i % 3 === 0) sizes[i] = baseSize;
            else sizes[i] = 0;
          }
          group.geometry.attributes.color.needsUpdate = true;
          group.geometry.attributes.size.needsUpdate = true;
        } else {
          // EXPLODE
          group.scale.set(1, 1, 1);
          group.rotation.y += (handRotY - group.rotation.y) * 0.1;

          // size, color
          for (let i = 0; i < count; i++) {
            sizes[i] = baseSize;
            let brightness = 1.0;
            if (type === "gold" || type === "red") {
              brightness = 0.8 + 0.5 * Math.sin(time * 12 + phases[i]);
            }
            colors[i * 3] = baseColor.r * brightness;
            colors[i * 3 + 1] = baseColor.g * brightness;
            colors[i * 3 + 2] = baseColor.b * brightness;
          }
          group.geometry.attributes.size.needsUpdate = true;
          group.geometry.attributes.color.needsUpdate = true;
        }
      }

      function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;
        const speed = 0.08;
        const handRotY = (handX - 0.5) * 4.0;

        updateParticleGroup(groupGold, "gold", state, speed, handRotY, time);
        updateParticleGroup(groupRed, "red", state, speed, handRotY, time);
        updateParticleGroup(groupGift, "gift", state, speed, handRotY, time);

        photoMeshes.forEach((mesh, i) => {
          if (!mesh.material.map && photoTextures[i]) {
            mesh.material.map = photoTextures[i];
            mesh.material.needsUpdate = true;
          }
        });

        if (state === "CAKE") {
          titleMesh.visible = true;
          loveMesh.visible = false;
          titleMesh.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
          photoMeshes.forEach((m) => {
            m.scale.lerp(new THREE.Vector3(0, 0, 0), 0.1);
            m.visible = false;
          });
        } else if (state === "HEART") {
          titleMesh.visible = false;
          loveMesh.visible = true;
          photoMeshes.forEach((m) => {
            m.visible = false;
          });
          const s = 1 + Math.abs(Math.sin(time * 3)) * 0.1;
          loveMesh.scale.set(s, s, 1);
        } else if (state === "EXPLODE") {
          titleMesh.visible = false;
          loveMesh.visible = false;
          const baseAngle = groupGold.rotation.y;
          const angleStep = (Math.PI * 2) / 5;
          let bestIdx = 0;
          let maxZ = -999;
          photoMeshes.forEach((mesh, i) => {
            mesh.visible = true;
            const angle = baseAngle + i * angleStep;
            const x = Math.sin(angle) * CONFIG.photoOrbitRadius;
            const z = Math.cos(angle) * CONFIG.photoOrbitRadius;
            const y = Math.sin(time + i) * 3;
            mesh.position.lerp(new THREE.Vector3(x, y, z), 0.1);
            mesh.lookAt(camera.position);
            if (z > maxZ) {
              maxZ = z;
              bestIdx = i;
            }
            if (z > 5) {
              const ds = 1.0 + (z / CONFIG.photoOrbitRadius) * 0.8;
              mesh.scale.lerp(new THREE.Vector3(ds, ds, ds), 0.1);
            } else {
              mesh.scale.lerp(new THREE.Vector3(0.6, 0.6, 0.6), 0.1);
            }
          });
          selectedIndex = bestIdx;
        } else if (state === "PHOTO") {
          loveMesh.visible = false;
          photoMeshes.forEach((mesh, i) => {
            if (i === selectedIndex) {
              mesh.position.lerp(new THREE.Vector3(0, 0, 60), 0.1);
              mesh.scale.lerp(new THREE.Vector3(5, 5, 5), 0.1);
              mesh.lookAt(camera.position);
              mesh.rotation.z = 0;
            } else {
              mesh.scale.lerp(new THREE.Vector3(0, 0, 0), 0.1);
            }
          });
        }
        renderer.render(scene, camera);
      }

      function startSystem() {
        document.getElementById("btnStart").style.display = "none";
        bgMusic.play().catch((e) => console.log(e));
        init3D();

        const video = document.getElementsByClassName("input_video")[0];
        const canvas = document.getElementById("camera-preview");
        const ctx = canvas.getContext("2d");

        const hands = new Hands({
          locateFile: (file) =>
            `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
        });
        hands.setOptions({
          maxNumHands: 2,
          modelComplexity: 1,
          minDetectionConfidence: 0.7,
          minTrackingConfidence: 0.7,
        });

        hands.onResults((results) => {
          ctx.clearRect(0, 0, 100, 75);
          ctx.drawImage(results.image, 0, 0, 100, 75);

          // --- Hand Logic  ---
          if (results.multiHandLandmarks.length === 2) {
            const h1 = results.multiHandLandmarks[0];
            const h2 = results.multiHandLandmarks[1];
            const distIndex = Math.hypot(h1[8].x - h2[8].x, h1[8].y - h2[8].y);
            const distThumb = Math.hypot(h1[4].x - h2[4].x, h1[4].y - h2[4].y);
            if (distIndex < 0.1 && distThumb < 0.1) {
              state = "HEART";
              return;
            }
          }

          if (results.multiHandLandmarks.length > 0) {
            const lm = results.multiHandLandmarks[0];
            handX = lm[9].x;
            const tips = [8, 12, 16, 20];
            const wrist = lm[0];
            let openDist = 0;
            tips.forEach(
              (i) =>
                (openDist += Math.hypot(lm[i].x - wrist.x, lm[i].y - wrist.y)),
            );
            const avgDist = openDist / 4;
            const pinchDist = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);

            if (avgDist < 0.18) {
              // Yêu cầu nắm tay chặt hơn để hiện Bánh
              state = "CAKE";
            } else if (pinchDist < 0.04 && avgDist > 0.2) {
              // Chụm ngón chuẩn xác hơn
              state = "PHOTO";
            } else if (avgDist > 0.35) {
              // Tay phải xòe đủ rộng mới tính là Mở (Pháo hoa)
              state = "EXPLODE";
            }
            // Nếu ngón tay đang nửa đóng nửa mở, hệ thống sẽ tự động bỏ qua và giữ nguyên hiệu ứng hiện tại (tránh nhiễu)
          } else {
            state = "CAKE";
          }
        });

        const cameraUtils = new Camera(video, {
          onFrame: async () => {
            await hands.send({ image: video });
          },
          width: 320,
          height: 240,
          facingMode: "user", // Ưu tiên Camera trước
        });
        cameraUtils.start();
      }

      window.addEventListener("resize", () => {
        if (camera) {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
          camera.position.z = window.innerWidth < 768 ? 140 : 100;
        }
      });
    </script>
  </body>
</html>
